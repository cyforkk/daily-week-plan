# Netlify 部署配置
# 文档：https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  # 静态站点：把主工具复制为 dist/index.html，不暴露 docs/skills 等
  # 使用 Node，兼容 Netlify Linux 与本地 Windows
  command = "node -e \"require('fs').mkdirSync('dist',{recursive:true});require('fs').copyFileSync('daily-plan-template.html','dist/index.html')\""
  publish = "dist"

# 本地 netlify dev 时用同一发布目录
[dev]
  command = ""
  targetPort = 0
  publish = "dist"
  autoLaunch = true
  framework = "#static"

# 安全与缓存相关响应头
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    # 单页本地工具，无敏感 API；允许 inline 脚本（当前为单文件内联 JS）
    # 若日后外置脚本，可收紧 script-src
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; base-uri 'self'; form-action 'self'"

[[headers]]
  for = "/index.html"
  [headers.values]
    # HTML 始终回源，避免用户拿到旧壳
    Cache-Control = "public, max-age=0, must-revalidate"

# 未知路径回首页（用户直接打开工具，无需记忆文件名）
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
